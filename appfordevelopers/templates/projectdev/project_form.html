{% extends "main.html" %}
{% load static %}

{% block body %}
    <main class="formPage my-xl">
        <div class="content-box">
            <div class="formWrapper">
                <a class="backButton" href="{% url 'account' %}"><i class="fa fa-angle-left" style="font-size: 30px;"></i></a>
                <br>

                <form class="form" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <!-- Input:Text -->
                     {% for field in form %}
                    <div class="form__field">
                        <label for="formInput#text">{{ field.label}} </label>
                        {{field}}
                    </div>


                    {% endfor %}

                    <div class="form__field">
                        {% for tag in project.tags.all %}
                            <div class="project-tag tag--pill tag--sub tag--lg"
                             data-tag="{{tag.id}}"  data-project="{{project.id}}">
                                {{tag.name}} &#215;
                            </div>
                        {% endfor %}
                    </div>

                    <div class="form__field">
                        <label for="formInput#text">Tags</label>
                        <textarea class="input" name="newtags" id="" placeholder="A Tags here.."></textarea>
                    </div>
                    <input class="btn btn--sub btn--lg  my-md" type="submit" value="Submit" />
                </form>
            </div>
        </div>
    </main>
{% endblock %}
