{% extends "main.html" %}
{% load static %}

{% block body %}


<main class="formPage my-xl">
    
        <div class="content-box">
            <h1>Edit Account</h1>
            <div class="formWrapper">
                <a class="backButton" href="{% url 'account' %}"><i class="fa fa-angle-left" style="font-size: 30px;"></i></a>
                <br>

                <form class="form" action="{% url 'editaccount' %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <!-- Input:Text -->
                     {% for field in form %}
                        <div class="form__field">
                            <label for="formInput#text">{{field.label}} </label>
                            {{field}}
                        </div>
                     {% endfor %}
                    <input class="btn btn--sub btn--lg  my-md" type="submit" value="Submit" />
                </form>
            </div>
        </div>
    </main>
{% endblock body %}
